name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  tests-openfoam-org-v12:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.11"

      - name: Install system dependencies and OpenFOAM.org v12
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg wget software-properties-common libglu1-mesa
          wget -O - https://dl.openfoam.org/gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/openfoam.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/openfoam.gpg] http://dl.openfoam.org/ubuntu jammy main" \
            | sudo tee /etc/apt/sources.list.d/openfoam.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y openfoam12

      - name: Run tests with OpenFOAM.org v12
        shell: bash
        run: |
          . /opt/openfoam12/etc/bashrc
      
          # Quick sanity checks that OpenFOAM is actually configured
          echo "WM_PROJECT=$WM_PROJECT"
          echo "FOAM_INST_DIR=$FOAM_INST_DIR"
          command -v blockMesh || true
          command -v snappyHexMesh || true
      
          # Run tests with full output
          cd tests
          uv run python -m pytest -vv -ra tests/test_ksite_mesh.py tests/test_cylinder_caps_mesh.py
          cd -

      - name: Check if documentation can be built
        run: uv run mkdocs build -s
